<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raster Overlay – Africa</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body, html { margin:0; padding:0; }
    #map { height:100vh; width:100%; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    const map = L.map('map', {
      center: [0, 20],          // latitude 0°, longitude 20°E (Africa)
      zoom: 3,                  // nice overview of the continent
      maxBounds: [[-90, -180], [90, 180]],
      maxBoundsViscosity: 1.0
    });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    const imageUrl = '/earth_observation/raster/rainfall/1/';
    const bounds = [[-90, -180], [90, 180]];

    L.imageOverlay(imageUrl, bounds, {
      opacity: 0.7,
      attribution: 'Rainfall (month 1)'
    }).addTo(map);

    // Optional: you can still fit the world if you want, but we skip it
    // map.fitBounds(bounds);  // comment out to keep Africa focus
  </script>
</body>
</html>
