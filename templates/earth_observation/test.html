<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Remote Sensing Viewer</title>
  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    /* ----- Global Reset ----- */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

    /* ----- Map ----- */
    #map { height: 100vh; width: 100%; }

    /* ----- Menu (floating left) ----- */
    .menu-container {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 1000;
      width: 300px;
      max-height: calc(100vh - 100px);
      overflow-y: auto;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 8px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
      padding: 12px 10px;
      font-size: 14px;
    }
    .menu-container::-webkit-scrollbar { width: 6px; }
    .menu-container::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

    .menu-section-title, .sub-section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      padding: 6px 4px;
      font-weight: 600;
      color: #2c3e50;
      border-bottom: 1px solid #eee;
      transition: background 0.15s;
    }
    .menu-section-title:hover, .sub-section-title:hover {
      background: #f5f7fa;
    }
    .sub-section-title {
      padding-left: 16px;
      font-weight: 500;
      font-size: 0.95em;
      border-bottom: 1px dashed #e9ecef;
    }
    .toggle-icon {
      font-size: 0.8em;
      transition: transform 0.2s;
    }
    .toggle-icon.rotated {
      transform: rotate(180deg);
    }

    .sub-menu {
      padding-left: 12px;
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.3s ease;
    }
    .sub-menu.open {
      max-height: 2000px; /* enough for all items */
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 6px 4px 20px;
      color: #34495e;
      text-decoration: none;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.15s, color 0.15s;
      font-weight: 400;
    }
    .menu-item i { width: 18px; color: #7f8c8d; }
    .menu-item:hover {
      background: #e8f4fd;
      color: #1a5276;
    }
    .menu-item.active {
      background: #d4e6f1;
      color: #1a5276;
      font-weight: 500;
    }

    /* ----- Month Control (floating right) ----- */
    #month-control {
      position: absolute;
      bottom: 30px;
      right: 30px;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.9);
      padding: 12px 18px;
      border-radius: 8px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      display: none;
      align-items: center;
      gap: 12px;
      font-family: 'Segoe UI', sans-serif;
    }
    #month-control label { font-weight: 600; }
    #month-control input[type="range"] {
      width: 150px;
      cursor: pointer;
    }
    #month-control span {
      min-width: 30px;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div id="map"></div>

  <!-- ===== MENU ===== -->
  <div class="menu-container" id="menuContainer">
    <div class="menu-section" id="section-remote">
      <div class="menu-section-title" onclick="toggleSection(this)">
        🛰 Remote Sensing Indicators
        <i class="fa-solid fa-chevron-down toggle-icon"></i>
      </div>
      <div class="sub-menu open" id="sub-remote">
        <!-- generated by JavaScript -->
      </div>
    </div>
  </div>

  <!-- ===== MONTH CONTROL ===== -->
  <div id="month-control">
    <label for="monthSlider">Month:</label>
    <input type="range" id="monthSlider" min="1" max="12" value="1" step="1" />
    <span id="monthDisplay">1</span>
  </div>

  <script>
    // ------------------------------------------------------------
    // 1. DATASET REGISTRY (mirrors your Django config)
    // ------------------------------------------------------------
    const DATASETS = {
      // Monthly
      rainfall:          { type: 'month', label: 'Mean Annual Rainfall' },
      temperature_avg:   { type: 'month', label: 'Mean Temperature' },
      temperature_max:   { type: 'month', label: 'Maximum Temperature' },
      temperature_min:   { type: 'month', label: 'Minimum Temperature' },
      wind_speed:        { type: 'month', label: 'Wind Speed' },
      // Static
      demographics_children_female: { type: 'static', label: 'Child Population (Female)' },
      demographics_children_male:   { type: 'static', label: 'Child Population (Male)' },
      demographics_children:        { type: 'static', label: 'Total Child Population' },
      land_degradation:             { type: 'static', label: 'Land Degradation' },
      flood_risk_coastal:           { type: 'static', label: 'Coastal Flood Risk' },
      flood_risk_fluvial:           { type: 'static', label: 'Fluvial Flood Risk' },
      drought_risk:                 { type: 'static', label: 'Drought Risk' },
      pollution_air:                { type: 'static', label: 'Air Pollution' },
      pollution_water:              { type: 'static', label: 'Water Pollution' },
      cyclone_risk:                 { type: 'static', label: 'Cyclone Risk' },
      diseases_cholera:             { type: 'static', label: 'Cholera Risk' },
      diseases_malaria:             { type: 'static', label: 'Malaria Risk' },
    };

    // ------------------------------------------------------------
    // 2. MENU STRUCTURE (nested)
    //    Use the exact hierarchy from your sample, but with our datasets.
    // ------------------------------------------------------------
    const MENU = {
      "Population & Demographics": {
        items: [
          { slug: "demographics_children", label: "Total Child Population" },
          { slug: "demographics_children_female", label: "Child Population (Female)" },
          { slug: "demographics_children_male", label: "Child Population (Male)" },
        ]
      },
      "Baseline Climate & Environmental Conditions": {
        subsections: {
          "Rainfall": {
            items: [
              { slug: "rainfall", label: "Mean Annual Rainfall" },
            ]
          },
          "Temperature": {
            items: [
              { slug: "temperature_avg", label: "Mean Temperature" },
              { slug: "temperature_max", label: "Maximum Temperature" },
              { slug: "temperature_min", label: "Minimum Temperature" },
            ]
          },
          "Wind": {
            items: [
              { slug: "wind_speed", label: "Wind Speed" },
            ]
          },
          "Vegetation & Land": {
            items: [
              { slug: "land_degradation", label: "Land Degradation" },
            ]
          }
        }
      },
      "Water-Related Hazards": {
        items: [
          { slug: "flood_risk_coastal", label: "Coastal Flood Risk" },
          { slug: "flood_risk_fluvial", label: "Fluvial Flood Risk" },
          { slug: "drought_risk", label: "Drought Risk" },
        ]
      },
      "Pollution & Health": {
        items: [
          { slug: "pollution_air", label: "Air Pollution" },
          { slug: "pollution_water", label: "Water Pollution" },
          { slug: "diseases_cholera", label: "Cholera Risk" },
          { slug: "diseases_malaria", label: "Malaria Risk" },
          { slug: "cyclone_risk", label: "Cyclone Risk" },
        ]
      }
    };

    // ------------------------------------------------------------
    // 3. RENDER MENU FROM STRUCTURE
    // ------------------------------------------------------------
    const container = document.getElementById('sub-remote');

    function buildMenu() {
      let html = '';
      for (const [sectionTitle, sectionData] of Object.entries(MENU)) {
        const sectionId = `sec-${sectionTitle.replace(/\s/g, '-')}`;
        html += `<div class="sub-section-title" onclick="toggleSection(this)" data-toggle-id="${sectionId}">
                   ${sectionTitle}
                   <i class="fa-solid fa-chevron-down toggle-icon"></i>
                 </div>`;
        html += `<div class="sub-menu" id="${sectionId}">`;

        if (sectionData.subsections) {
          // Nested subsections (like Rainfall, Temperature)
          for (const [subTitle, subData] of Object.entries(sectionData.subsections)) {
            const subId = `sub-${subTitle.replace(/\s/g, '-')}`;
            html += `<div class="sub-section-title" onclick="toggleSection(this)" data-toggle-id="${subId}" style="padding-left:20px;">
                       ${subTitle}
                       <i class="fa-solid fa-chevron-down toggle-icon"></i>
                     </div>`;
            html += `<div class="sub-menu" id="${subId}">`;
            subData.items.forEach(item => {
              const label = item.label || DATASETS[item.slug]?.label || item.slug;
              html += `<a class="menu-item" data-slug="${item.slug}"><i class="fa-regular fa-circle"></i> ${label}</a>`;
            });
            html += `</div>`;
          }
        } else {
          // Direct items under this section
          sectionData.items.forEach(item => {
            const label = item.label || DATASETS[item.slug]?.label || item.slug;
            html += `<a class="menu-item" data-slug="${item.slug}"><i class="fa-regular fa-circle"></i> ${label}</a>`;
          });
        }

        html += `</div>`;
      }
      container.innerHTML = html;

      // Open all top-level sub-sections initially? Maybe open first level.
      // We'll leave them closed; user can expand.
      // For convenience, we can open the first section (Population & Demographics) by default.
      const firstSub = container.querySelector('.sub-menu');
      if (firstSub) {
        firstSub.classList.add('open');
        const icon = firstSub.previousElementSibling?.querySelector('.toggle-icon');
        if (icon) icon.classList.add('rotated');
      }
    }

    buildMenu();

    // ------------------------------------------------------------
    // 4. TOGGLE FUNCTION (used in onclick)
    // ------------------------------------------------------------
    window.toggleSection = function(el) {
      // Find the next sibling with class 'sub-menu'
      let subMenu = el.nextElementSibling;
      while (subMenu && !subMenu.classList.contains('sub-menu')) {
        subMenu = subMenu.nextElementSibling;
      }
      if (!subMenu) return;

      subMenu.classList.toggle('open');
      const icon = el.querySelector('.toggle-icon');
      if (icon) icon.classList.toggle('rotated');
    };

    // ------------------------------------------------------------
    // 5. LEAFLET MAP
    // ------------------------------------------------------------
    const map = L.map('map', {
      center: [0, 20],
      zoom: 3,
      maxBounds: [[-90, -180], [90, 180]],
      maxBoundsViscosity: 1.0
    });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    const BOUNDS = [[-90, -180], [90, 180]];
    let currentOverlay = null;
    let currentSlug = null;

    // ------------------------------------------------------------
    // 6. LOAD RASTER
    // ------------------------------------------------------------
    function loadRaster(slug) {
      const config = DATASETS[slug];
      if (!config) {
        console.warn('Unknown dataset:', slug);
        return;
      }

      // Build URL
      let url = `/earth_observation/raster/${slug}/`;
      let monthVal = 1;
      if (config.type === 'month') {
        // Show month control
        const ctrl = document.getElementById('month-control');
        ctrl.style.display = 'flex';
        // Get current month value
        const slider = document.getElementById('monthSlider');
        monthVal = parseInt(slider.value, 10);
        if (isNaN(monthVal) || monthVal < 1 || monthVal > 12) monthVal = 1;
        url += `${monthVal}/`;
      } else {
        document.getElementById('month-control').style.display = 'none';
      }

      // Remove old overlay
      if (currentOverlay) {
        map.removeLayer(currentOverlay);
        currentOverlay = null;
      }

      // Add new overlay
      currentOverlay = L.imageOverlay(url, BOUNDS, {
        opacity: 0.7,
        attribution: slug.replace(/_/g, ' ').toUpperCase()
      }).addTo(map);

      // Highlight active menu item
      document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
      document.querySelectorAll(`.menu-item[data-slug="${slug}"]`).forEach(el => el.classList.add('active'));

      currentSlug = slug;
    }

    // ------------------------------------------------------------
    // 7. EVENT BINDING
    // ------------------------------------------------------------
    // Click on menu item
    container.addEventListener('click', function(e) {
      const item = e.target.closest('.menu-item');
      if (!item) return;
      const slug = item.dataset.slug;
      if (slug) {
        e.preventDefault();
        loadRaster(slug);
      }
    });

    // Month slider change
    const monthSlider = document.getElementById('monthSlider');
    const monthDisplay = document.getElementById('monthDisplay');
    monthSlider.addEventListener('input', function() {
      monthDisplay.textContent = this.value;
      if (currentSlug) {
        // Reload current dataset with new month
        loadRaster(currentSlug);
      }
    });

    // ------------------------------------------------------------
    // 8. INITIAL LOAD – load first item (or default)
    // ------------------------------------------------------------
    // Find the first menu item and load it
    const firstItem = container.querySelector('.menu-item');
    if (firstItem) {
      const slug = firstItem.dataset.slug;
      // Open the section containing it (for visibility)
      let parentSub = firstItem.closest('.sub-menu');
      while (parentSub) {
        parentSub.classList.add('open');
        const parentTitle = parentSub.previousElementSibling;
        if (parentTitle && parentTitle.classList.contains('sub-section-title')) {
          const icon = parentTitle.querySelector('.toggle-icon');
          if (icon) icon.classList.add('rotated');
        }
        parentSub = parentSub.parentElement?.closest?.('.sub-menu');
      }
      // Load it
      loadRaster(slug);
    } else {
      // fallback
      console.warn('No menu item found');
    }

  </script>
</body>
</html>
