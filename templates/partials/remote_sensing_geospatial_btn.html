<!-- View Full Raster Viewer Button -->
<div style="margin-top: 12px; padding: 8px 0; border-top: 1px solid #e8e8e8;">
    <a href="{% url 'view_raster' %}" 
       style="display: flex; align-items: center; gap: 10px;
              background: linear-gradient(90deg, #003366, #004c99); 
              color: #fff; 
              text-decoration: none;
              font-weight: 700; 
              font-size: 15px;
              padding: 12px 16px; 
              border-radius: 6px; 
              border-left: 5px solid #00bcd4;
              box-shadow: 0 2px 6px rgba(0,0,0,0.08);
              transition: all 0.2s ease;">
        <i class="fa-regular fa-satellite" style="font-size: 16px; color: #e0f7ff;"></i>
        <span style="flex: 1;">Environmental & Hazard Exposure</span>
        <i class="fa-solid fa-chevron-right" style="font-size: 12px; color: #e0f7ff;"></i>
    </a>
</div>
