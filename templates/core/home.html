{% extends 'base.html' %}
{% load static %}

{% block title %}
Dashboard
{% endblock %}

{% block extra_css %}

<style>

.content{

    padding:0;

}

#map{

    height:calc(100vh - 60px);

}

</style>

{% endblock %}

{% block content %}

<div id="map"></div>

{% endblock %}

{% block extra_js %}

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView(
    [20,0],
    2
);

L.tileLayer(
    'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
        maxZoom:19
    }
).addTo(map);

fetch(
    "{% static 'data/geojson/ne_10m_admin_0_countries_sm.geojson' %}"
)
.then(response => response.json())
.then(data => {

    const countries = L.geoJSON(data, {

        style: {

            color:"#666",

            weight:1,

            fillColor:"#d9d9d9",

            fillOpacity:0.5

        },

        onEachFeature:function(feature,layer){

            layer.bindTooltip(
                feature.properties.NAME_EN
            );

        }

    }).addTo(map);

    map.fitBounds(
        countries.getBounds()
    );

});

</script>

{% endblock %}
