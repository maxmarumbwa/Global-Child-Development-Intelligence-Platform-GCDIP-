<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>COG Rainfall Viewer (No Warping)</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        html, body, #map {
            height: 100%;
            margin: 0;
        }

        #status {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-family: sans-serif;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div id="map"></div>
<div id="status">Loading COG...</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/georaster"></script>
<script src="https://unpkg.com/georaster-layer-for-leaflet"></script>

<script>

    // -----------------------------
    // 1. BASE MAP
    // -----------------------------
    const map = L.map("map").setView([-19, 30], 5);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "&copy; OpenStreetMap"
    }).addTo(map);

    // -----------------------------
    // 2. COG URL (IMPORTANT)
    // -----------------------------
    const cogUrl = "/static/world_cog.tif"; 
    // OR your Django endpoint:
    // const cogUrl = "/api/cog/world";

    // -----------------------------
    // 3. LOAD COG DIRECTLY
    // -----------------------------
    fetch(cogUrl)
        .then(response => response.arrayBuffer())
        .then(arrayBuffer => parseGeoraster(arrayBuffer))
        .then(georaster => {

            const layer = new GeoRasterLayer({
                georaster: georaster,

                opacity: 0.7,

                resolution: 256, // higher = smoother, lower = faster

                pixelValuesToColorFn: values => {

                    const val = values[0];

                    if (val == null) return null;

                    // Example rainfall styling
                    if (val <= 25) return "#deebf7";
                    if (val <= 75) return "#9ecae1";
                    if (val <= 150) return "#3182bd";
                    return "#08519c";
                }
            });

            layer.addTo(map);

            map.fitBounds(layer.getBounds());

            document.getElementById("status").innerText =
                "COG loaded successfully (no warping)";
        })
        .catch(err => {
            console.error(err);
            document.getElementById("status").innerText =
                "Failed to load COG";
        });

</script>

</body>
</html>
