{% extends 'base.html' %}

{% block title %}
Child Mortality Chart
{% endblock %}

{% block content %}

<div class="card">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">Under‑5 Mortality Rate</h4>

        <!-- Compare toggle -->
        <div class="btn-group btn-group-sm" role="group">
            <button type="button" class="btn btn-outline-secondary active" id="singleBtn" onclick="setCompareMode(false)">Single</button>
            <button type="button" class="btn btn-outline-secondary" id="compareBtn" onclick="setCompareMode(true)">Compare</button>
        </div>
    </div>

    <!-- YEAR SLIDERS -->
    <div class="row mb-2 align-items-center">
        <div class="col-md-6" id="year1Container">
            <label class="form-label">Year 1: <span id="year1Label">{{ current_year }}</span></label>
            <input type="range" id="year1Slider" min="1960" max="2024"
                   value="{{ current_year }}" class="form-range"
                   oninput="onYear1Input(this.value)">
        </div>
        <div class="col-md-6" id="year2Container" style="display:none;">
            <label class="form-label">Year 2: <span id="year2Label">{{ current_year }}</span></label>
            <input type="range" id="year2Slider" min="1960" max="2024"
                   value="{{ current_year }}" class="form-range"
                   oninput="onYear2Input(this.value)">
        </div>
    </div>

    <!-- CONTROLS ROW -->
    <div class="row mb-3 align-items-center g-2">
        <div class="col-auto">
            <button id="playBtn" class="btn btn-primary btn-sm" onclick="togglePlay()">▶ Play</button>
        </div>
        <div class="col-auto">
            <label for="speedSlider" class="form-label me-2">Speed</label>
            <input type="range" id="speedSlider" min="200" max="2000" value="800" step="100"
                   class="form-range" style="width:150px;" oninput="updateSpeed(this.value)">
            <span id="speedLabel">800 ms</span>
        </div>
        <div class="col-auto">
            <button class="btn btn-secondary btn-sm" onclick="resetToStart()">Reset</button>
        </div>
        <div class="col-auto">
            <label for="orderSelect" class="form-label me-1">Order</label>
            <select id="orderSelect" class="form-select form-select-sm" style="width:auto; display:inline-block;" onchange="applyFilters()">
                <option value="desc">Highest</option>
                <option value="asc">Lowest</option>
            </select>
        </div>
        <div class="col-auto">
            <label for="topNSelect" class="form-label me-1">Show</label>
            <select id="topNSelect" class="form-select form-select-sm" style="width:auto; display:inline-block;" onchange="applyFilters()">
                <option value="10">10</option>
                <option value="25" selected>25</option>
                <option value="50">50</option>
                <option value="100">100</option>
                <option value="200">200</option>
                <option value="0">All</option>
            </select>
        </div>
        <div class="col-auto">
            <label for="colorBySelect" class="form-label me-1">Color by</label>
            <select id="colorBySelect" class="form-select form-select-sm" style="width:auto; display:inline-block;" onchange="applyFilters()">
                <option value="">None</option>
                <option value="continent">Continent</option>
                <option value="income_group">Income Group</option>
                <option value="subregion">Subregion</option>
            </select>
        </div>
        <div class="col-auto ms-auto">
            <div class="btn-group btn-group-sm" role="group">
                <button type="button" class="btn btn-outline-primary active" id="barBtn" onclick="setChartType('bar')">Bar</button>
                <button type="button" class="btn btn-outline-primary" id="lineBtn" onclick="setChartType('line')">Line</button>
            </div>
        </div>
    </div>

    <!-- CHART CONTAINER -->
    <div style="position: relative; height:400px; width:100%;">
        <canvas id="mortalityChart"></canvas>
    </div>

    <!-- COLOR LEGEND (hidden by default) -->
    <div id="colorLegend" style="margin-top:15px; display:none; text-align:center;">
        <div id="legendItems" style="display:flex; flex-wrap:wrap; justify-content:center; gap:12px;"></div>
    </div>

    <!-- FALLBACK MESSAGE -->
    <div id="noDataMessage" class="alert alert-warning text-center" style="display:none;">
        No data available for the selected year(s) and filters.
    </div>

    <!-- FILTERS -->
    <div class="row mt-4">
        <div class="col-md-4">
            <label class="form-label">Continent</label>
            <select id="continentFilter" class="form-select" onchange="applyFilters()">
                <option value="">All Continents</option>
                {% for c in continents %}
                <option value="{{ c }}">{{ c }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-4">
            <label class="form-label">Income Group</label>
            <select id="incomeFilter" class="form-select" onchange="applyFilters()">
                <option value="">All Income Groups</option>
                {% for i in income_groups %}
                <option value="{{ i }}">{{ i }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-4">
            <label class="form-label">Subregion</label>
            <select id="subregionFilter" class="form-select" onchange="applyFilters()">
                <option value="">All Subregions</option>
                {% for s in subregions %}
                <option value="{{ s }}">{{ s }}</option>
                {% endfor %}
            </select>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
// ==============================
// GLOBALS
// ==============================
const allDataByYear = {{ all_data_json|safe }};

let chart = null;
let currentYear = {{ current_year }};
let year1 = {{ current_year }};
let year2 = {{ current_year }};
let compareMode = false;
let chartType = 'bar';

const MIN_YEAR = 1960;
const MAX_YEAR = 2024;

let isPlaying = false;
let animationInterval = null;
let animationDelay = 800;

// ==============================
// COLOR PALETTES
// ==============================
const categoryColors = {
    // Income groups (World Bank)
    'High income': '#1f77b4',
    'Upper middle income': '#ff7f0e',
    'Lower middle income': '#2ca02c',
    'Low income': '#d62728',
    // Continents
    'Africa': '#e41a1c',
    'Americas': '#377eb8',
    'Asia': '#4daf4a',
    'Europe': '#984ea3',
    'Oceania': '#ff7f00',
    // Additional fallback for subregions or unknown
};

// Generic fallback palette
const fallbackColors = [
    '#a6cee3', '#b2df8a', '#fb9a99', '#fdbf6f', '#cab2d6',
    '#ffff99', '#b15928', '#1f78b4', '#33a02c', '#e31a1c',
    '#ff7f00', '#6a3d9a', '#b2df8a', '#a6cee3', '#fdbf6f'
];

// ==============================
// UTILITY: get color for a category value
// ==============================
function getCategoryColor(category, value) {
    if (!category || !value) return 'rgba(54, 162, 235, 0.5)';
    const key = `${category}:${value}`;
    // If predefined, use it
    if (categoryColors[value]) {
        return categoryColors[value];
    }
    // Else generate a deterministic color from the string
    let hash = 0;
    for (let i = 0; i < key.length; i++) {
        hash = (hash << 5) - hash + key.charCodeAt(i);
        hash = hash & hash;
    }
    const idx = Math.abs(hash) % fallbackColors.length;
    return fallbackColors[idx];
}

// ==============================
// UPDATE COLOR LEGEND
// ==============================
function updateLegend(data, colorBy) {
    const legendDiv = document.getElementById('colorLegend');
    const itemsDiv = document.getElementById('legendItems');
    if (!colorBy) {
        legendDiv.style.display = 'none';
        return;
    }

    // Collect unique categories and their colors from the data
    const categories = {};
    data.forEach(d => {
        const val = d[colorBy];
        if (val) {
            const color = getCategoryColor(colorBy, val);
            categories[val] = color;
        }
    });

    const keys = Object.keys(categories).sort();
    if (keys.length === 0) {
        legendDiv.style.display = 'none';
        return;
    }

    legendDiv.style.display = 'block';
    itemsDiv.innerHTML = keys.map(key => `
        <div style="display:flex; align-items:center; gap:5px;">
            <span style="display:inline-block; width:18px; height:18px; background-color:${categories[key]}; border:1px solid #ddd;"></span>
            <span style="font-size:13px;">${key}</span>
        </div>
    `).join('');
}

// ==============================
// RENDER CHART (with color highlighting)
// ==============================
function renderChart(data1, data2, year1Label, year2Label) {
    const noDataMsg = document.getElementById("noDataMessage");
    const canvas = document.getElementById("mortalityChart");
    const ctx = canvas.getContext("2d");

    const colorBy = document.getElementById("colorBySelect").value;

    if (chart) { chart.destroy(); chart = null; }

    let datasets = [];
    let labels = [];
    let displayData = []; // used for legend

    if (compareMode && data1 && data2) {
        // Intersection of countries
        const countries1 = new Set(data1.map(d => d.country));
        const countries2 = new Set(data2.map(d => d.country));
        const common = [...countries1].filter(c => countries2.has(c));

        if (common.length === 0) {
            noDataMsg.style.display = 'block';
            document.getElementById('colorLegend').style.display = 'none';
            return;
        }

        const order = document.getElementById("orderSelect").value;
        const map1 = new Map(data1.map(d => [d.country, d]));
        const map2 = new Map(data2.map(d => [d.country, d]));

        let combined = common.map(country => ({
            country: country,
            mortality1: map1.get(country).mortality,
            mortality2: map2.get(country).mortality,
            year1: year1Label,
            year2: year2Label,
            continent: map1.get(country).continent || '',
            income_group: map1.get(country).income_group || '',
            subregion: map1.get(country).subregion || '',
        }));

        combined.sort((a, b) => order === 'desc' ? b.mortality1 - a.mortality1 : a.mortality1 - b.mortality1);

        const topN = parseInt(document.getElementById("topNSelect").value);
        if (topN > 0 && combined.length > topN) {
            combined = combined.slice(0, topN);
        }

        labels = combined.map(d => d.country);
        const values1 = combined.map(d => d.mortality1);
        const values2 = combined.map(d => d.mortality2);

        // Determine colors
        let bgColors1, bgColors2;
        if (colorBy) {
            bgColors1 = combined.map(d => getCategoryColor(colorBy, d[colorBy]));
            bgColors2 = combined.map(d => getCategoryColor(colorBy, d[colorBy]));
            displayData = combined; // for legend
        } else {
            bgColors1 = combined.map(() => 'rgba(54, 162, 235, 0.6)');
            bgColors2 = combined.map(() => 'rgba(255, 99, 132, 0.6)');
        }

        datasets = [
            {
                label: `Year ${year1Label}`,
                data: values1,
                backgroundColor: bgColors1,
                borderColor: bgColors1.map(c => c.replace('0.6', '1')),
                borderWidth: 1,
            },
            {
                label: `Year ${year2Label}`,
                data: values2,
                backgroundColor: bgColors2,
                borderColor: bgColors2.map(c => c.replace('0.6', '1')),
                borderWidth: 1,
            }
        ];
    } else {
        // Single mode
        let data = data1 || [];
        if (data.length === 0) {
            noDataMsg.style.display = 'block';
            document.getElementById('colorLegend').style.display = 'none';
            return;
        }
        const order = document.getElementById("orderSelect").value;
        data.sort((a, b) => order === 'desc' ? b.mortality - a.mortality : a.mortality - b.mortality);
        const topN = parseInt(document.getElementById("topNSelect").value);
        if (topN > 0 && data.length > topN) {
            data = data.slice(0, topN);
        }

        labels = data.map(d => d.country);
        const values = data.map(d => d.mortality);

        let bgColors;
        if (colorBy) {
            bgColors = data.map(d => getCategoryColor(colorBy, d[colorBy]));
            displayData = data;
        } else {
            bgColors = data.map(() => 'rgba(54, 162, 235, 0.5)');
        }

        datasets = [{
            label: `Under‑5 Mortality Rate (${year1Label})`,
            data: values,
            backgroundColor: bgColors,
            borderColor: bgColors.map(c => c.replace('0.5', '1')),
            borderWidth: 1,
            pointBackgroundColor: bgColors,
            pointBorderColor: '#fff',
            pointRadius: 3,
            pointHoverRadius: 5,
            tension: 0.1,
            fill: false,
        }];
    }

    noDataMsg.style.display = 'none';

    // Update legend
    if (colorBy && displayData.length > 0) {
        updateLegend(displayData, colorBy);
    } else {
        document.getElementById('colorLegend').style.display = 'none';
    }

    const isLine = chartType === 'line';
    const type = isLine ? 'line' : 'bar';

    let titleText = compareMode ?
        `Under‑5 Mortality Rate (${year1Label} vs ${year2Label})` :
        `Under‑5 Mortality Rate (${year1Label})`;
    if (colorBy) {
        titleText += ` — colored by ${colorBy}`;
    }

    chart = new Chart(ctx, {
        type: type,
        data: {
            labels: labels,
            datasets: datasets
        },
        options: {
            animation: false,
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: true },
                title: {
                    display: true,
                    text: titleText
                }
            },
            scales: {
                x: {
                    ticks: {
                        autoSkip: false,
                        maxRotation: 90,
                        minRotation: 90
                    }
                },
                y: {
                    beginAtZero: true,
                    title: {
                        display: true,
                        text: "Deaths per 1,000 Live Births"
                    }
                }
            }
        }
    });
}

// ==============================
// FILTERING + ORDER + TOP N
// ==============================
function applyFilters() {
    const continent = document.getElementById("continentFilter").value;
    const income = document.getElementById("incomeFilter").value;
    const subregion = document.getElementById("subregionFilter").value;

    const filterFn = (d) => {
        const continentMatch = !continent || d.continent === continent;
        const incomeMatch = !income || d.income_group === income;
        const subregionMatch = !subregion || d.subregion === subregion;
        return continentMatch && incomeMatch && subregionMatch;
    };

    if (compareMode) {
        let data1 = loadYearData(year1).filter(filterFn);
        let data2 = loadYearData(year2).filter(filterFn);
        renderChart(data1, data2, year1, year2);
    } else {
        let data = loadYearData(year1).filter(filterFn);
        renderChart(data, null, year1, null);
    }
}

function loadYearData(year) {
    const yearStr = String(year);
    return allDataByYear.hasOwnProperty(yearStr) ? allDataByYear[yearStr] : [];
}

// ==============================
// COMPARE MODE TOGGLE
// ==============================
function setCompareMode(mode) {
    compareMode = mode;
    document.getElementById("singleBtn").classList.toggle('active', !mode);
    document.getElementById("compareBtn").classList.toggle('active', mode);
    document.getElementById("year2Container").style.display = mode ? 'block' : 'none';
    applyFilters();
}

// ==============================
// YEAR SLIDER INPUTS
// ==============================
function onYear1Input(value) {
    if (isPlaying) stopAnimation();
    year1 = parseInt(value);
    document.getElementById("year1Label").innerText = year1;
    if (!compareMode) currentYear = year1;
    applyFilters();
}

function onYear2Input(value) {
    if (isPlaying) stopAnimation();
    year2 = parseInt(value);
    document.getElementById("year2Label").innerText = year2;
    applyFilters();
}

// ==============================
// CHART TYPE TOGGLE
// ==============================
function setChartType(type) {
    if (chartType === type) return;
    chartType = type;
    document.getElementById('barBtn').classList.toggle('active', type === 'bar');
    document.getElementById('lineBtn').classList.toggle('active', type === 'line');
    applyFilters();
}

// ==============================
// ANIMATION CONTROLS (single only)
// ==============================
function togglePlay() {
    if (compareMode) {
        alert("Animation is available only in Single mode.");
        return;
    }
    if (isPlaying) {
        stopAnimation();
    } else {
        startAnimation();
    }
}

function startAnimation() {
    if (isPlaying || compareMode) return;
    if (currentYear >= MAX_YEAR) {
        currentYear = MIN_YEAR;
        document.getElementById("year1Slider").value = currentYear;
        document.getElementById("year1Label").innerText = currentYear;
        year1 = currentYear;
        applyFilters();
    }
    isPlaying = true;
    document.getElementById("playBtn").innerHTML = "⏸ Pause";

    animationInterval = setInterval(() => {
        currentYear += 1;
        if (currentYear > MAX_YEAR) {
            currentYear = MIN_YEAR;
        }
        document.getElementById("year1Slider").value = currentYear;
        document.getElementById("year1Label").innerText = currentYear;
        year1 = currentYear;
        applyFilters();
    }, animationDelay);
}

function stopAnimation() {
    if (animationInterval) {
        clearInterval(animationInterval);
        animationInterval = null;
    }
    isPlaying = false;
    document.getElementById("playBtn").innerHTML = "▶ Play";
}

function updateSpeed(value) {
    animationDelay = parseInt(value);
    document.getElementById("speedLabel").innerText = value + " ms";
    if (isPlaying) {
        stopAnimation();
        startAnimation();
    }
}

function resetToStart() {
    if (isPlaying) stopAnimation();
    currentYear = MIN_YEAR;
    year1 = MIN_YEAR;
    year2 = MIN_YEAR + 1;
    document.getElementById("year1Slider").value = year1;
    document.getElementById("year1Label").innerText = year1;
    document.getElementById("year2Slider").value = year2;
    document.getElementById("year2Label").innerText = year2;
    applyFilters();
}

// ==============================
// INIT
// ==============================
document.addEventListener('DOMContentLoaded', init);
</script>
{% endblock %}
