{% extends 'base.html' %}

{% block title %}
Child Mortality Chart
{% endblock %}

{% block content %}

<div class="card">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">Under‑5 Mortality Rate</h4>
        <div style="width:300px;">
            <label class="form-label">Year: <span id="yearLabel">{{ current_year|default:2023 }}</span></label>
            <input type="range" id="yearSlider" min="1960" max="2024"
                   value="{{ current_year|default:2023 }}" class="form-range"
                   oninput="onSliderInput(this.value)">
        </div>
    </div>

    <!-- ANIMATION CONTROLS -->
    <div class="row mb-3 align-items-center">
        <div class="col-auto">
            <button id="playBtn" class="btn btn-primary" onclick="togglePlay()">▶ Play</button>
        </div>
        <div class="col-auto">
            <label for="speedSlider" class="form-label me-2">Speed</label>
            <input type="range" id="speedSlider" min="200" max="3000" value="1000" step="100"
                   class="form-range" style="width:200px;" oninput="updateSpeed(this.value)">
            <span id="speedLabel">1000 ms</span>
        </div>
        <div class="col-auto">
            <button class="btn btn-secondary" onclick="resetToStart()">Reset</button>
        </div>
    </div>

    <div class="card-body">
        <canvas id="mortalityChart" height="120"></canvas>
    </div>

    <!-- FILTERS -->
    <div class="row mt-4">
        <div class="col-md-4">
            <label class="form-label">Continent</label>
            <select id="continentFilter" class="form-select" onchange="applyFilters()">
                <option value="">All Continents</option>
                {% for c in continents %}
                <option value="{{ c }}">{{ c }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-4">
            <label class="form-label">Income Group</label>
            <select id="incomeFilter" class="form-select" onchange="applyFilters()">
                <option value="">All Income Groups</option>
                {% for i in income_groups %}
                <option value="{{ i }}">{{ i }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-4">
            <label class="form-label">Subregion</label>
            <select id="subregionFilter" class="form-select" onchange="applyFilters()">
                <option value="">All Subregions</option>
                {% for s in subregions %}
                <option value="{{ s }}">{{ s }}</option>
                {% endfor %}
            </select>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
// ==============================
// GLOBALS
// ==============================
let chart;
let currentData = [];
let isPlaying = false;
let animationInterval = null;
let animationDelay = 1000; // milliseconds per step
const MIN_YEAR = 1960;
const MAX_YEAR = 2024;

// ==============================
// INITIAL DATASET FROM DJANGO
// ==============================
const initialData = [
    {% for row in records %}
    {
        country: "{{ row.country|escapejs }}",
        continent: "{{ row.continent|escapejs }}",
        income_group: "{{ row.income_group|escapejs }}",
        subregion: "{{ row.subregion|escapejs }}",
        year: {{ row.year }},
        mortality: {{ row.mortality }}
    },
    {% endfor %}
];

currentData = initialData;
renderChart(currentData);

// ==============================
// RENDER CHART
// ==============================
function renderChart(data) {
    const labels = data.map(d => d.country);
    const values = data.map(d => d.mortality);

    const ctx = document.getElementById("mortalityChart").getContext("2d");
    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: "bar",
        data: {
            labels: labels,
            datasets: [{
                label: "Under‑5 Mortality Rate",
                data: values,
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: true },
                title: {
                    display: true,
                    text: `Under‑5 Mortality Rate by Country (${data.length ? data[0].year : ''})`
                }
            },
            scales: {
                x: {
                    ticks: {
                        autoSkip: false,
                        maxRotation: 90,
                        minRotation: 90
                    }
                },
                y: {
                    beginAtZero: true,
                    title: {
                        display: true,
                        text: "Deaths per 1,000 Live Births"
                    }
                }
            }
        }
    });
}

// ==============================
// FETCH DATA FOR A NEW YEAR
// ==============================
function updateYear(year) {
    // Stop animation if playing
    if (isPlaying) stopAnimation();

    // Update slider and label
    document.getElementById("yearSlider").value = year;
    document.getElementById("yearLabel").innerText = year;

    // Store current filter selections
    const continentVal = document.getElementById("continentFilter").value;
    const incomeVal = document.getElementById("incomeFilter").value;
    const subregionVal = document.getElementById("subregionFilter").value;

    fetch(`/indicators/mortality-chart-data/?year=${year}`)
        .then(response => response.json())
        .then(data => {
            // Update dropdown options with new categories
            updateFilterOptions(data.continents, data.income_groups, data.subregions);
            // Restore previous selections if they exist in the new lists
            restoreFilterSelections(continentVal, incomeVal, subregionVal);
            // Store new data
            currentData = data.records;
            // Re-apply filters
            applyFilters();
        })
        .catch(err => console.error("Failed to fetch data:", err));
}

// ==============================
// UPDATE FILTER DROPDOWNS
// ==============================
function updateFilterOptions(continents, incomeGroups, subregions) {
    function populate(select, options) {
        const currentVal = select.value;
        select.innerHTML = '';
        const allOption = document.createElement('option');
        allOption.value = '';
        allOption.textContent = 'All';
        select.appendChild(allOption);
        options.forEach(opt => {
            const option = document.createElement('option');
            option.value = opt;
            option.textContent = opt;
            select.appendChild(option);
        });
        // Try to restore previous selection if it exists in new options
        if ([...select.options].some(opt => opt.value === currentVal)) {
            select.value = currentVal;
        }
    }

    populate(document.getElementById("continentFilter"), continents);
    populate(document.getElementById("incomeFilter"), incomeGroups);
    populate(document.getElementById("subregionFilter"), subregions);
}

// ==============================
// RESTORE FILTER SELECTIONS
// ==============================
function restoreFilterSelections(continent, income, subregion) {
    const continentSel = document.getElementById("continentFilter");
    const incomeSel = document.getElementById("incomeFilter");
    const subregionSel = document.getElementById("subregionFilter");

    if ([...continentSel.options].some(opt => opt.value === continent)) {
        continentSel.value = continent;
    }
    if ([...incomeSel.options].some(opt => opt.value === income)) {
        incomeSel.value = income;
    }
    if ([...subregionSel.options].some(opt => opt.value === subregion)) {
        subregionSel.value = subregion;
    }
}

// ==============================
// CLIENT‑SIDE FILTERING
// ==============================
function applyFilters() {
    const continent = document.getElementById("continentFilter").value;
    const income = document.getElementById("incomeFilter").value;
    const subregion = document.getElementById("subregionFilter").value;

    const filtered = currentData.filter(d => {
        const continentMatch = !continent || d.continent === continent;
        const incomeMatch = !income || d.income_group === income;
        const subregionMatch = !subregion || d.subregion === subregion;
        return continentMatch && incomeMatch && subregionMatch;
    });

    renderChart(filtered);
}

// ==============================
// SLIDER MANUAL INPUT
// ==============================
function onSliderInput(value) {
    // If animation is playing, stop it
    if (isPlaying) stopAnimation();
    // Update to the selected year
    updateYear(parseInt(value));
}

// ==============================
// ANIMATION CONTROLS
// ==============================
function togglePlay() {
    if (isPlaying) {
        stopAnimation();
    } else {
        startAnimation();
    }
}

function startAnimation() {
    if (isPlaying) return;
    isPlaying = true;
    document.getElementById("playBtn").innerHTML = "⏸ Pause";

    // If we are at max, reset to min
    let currentYear = parseInt(document.getElementById("yearSlider").value);
    if (currentYear >= MAX_YEAR) {
        currentYear = MIN_YEAR;
        document.getElementById("yearSlider").value = currentYear;
        document.getElementById("yearLabel").innerText = currentYear;
        // Fetch data for the reset year immediately
        fetchYearData(currentYear);
    }

    animationInterval = setInterval(() => {
        let year = parseInt(document.getElementById("yearSlider").value);
        year += 1;
        if (year > MAX_YEAR) {
            year = MIN_YEAR;
        }
        // Update the slider and fetch data
        document.getElementById("yearSlider").value = year;
        document.getElementById("yearLabel").innerText = year;
        fetchYearData(year);
    }, animationDelay);
}

function stopAnimation() {
    if (animationInterval) {
        clearInterval(animationInterval);
        animationInterval = null;
    }
    isPlaying = false;
    document.getElementById("playBtn").innerHTML = "▶ Play";
}

function fetchYearData(year) {
    // This is the same as updateYear but without stopping the animation (since we're already in control)
    // and we don't want to stop the interval.
    // We'll directly fetch and update.
    // Store current filter selections
    const continentVal = document.getElementById("continentFilter").value;
    const incomeVal = document.getElementById("incomeFilter").value;
    const subregionVal = document.getElementById("subregionFilter").value;

    fetch(`/indicators/mortality-chart-data/?year=${year}`)
        .then(response => response.json())
        .then(data => {
            updateFilterOptions(data.continents, data.income_groups, data.subregions);
            restoreFilterSelections(continentVal, incomeVal, subregionVal);
            currentData = data.records;
            applyFilters();
        })
        .catch(err => console.error("Failed to fetch data:", err));
}

function updateSpeed(value) {
    animationDelay = parseInt(value);
    document.getElementById("speedLabel").innerText = value + " ms";
    // If playing, restart interval with new speed
    if (isPlaying) {
        stopAnimation();
        startAnimation();
    }
}

function resetToStart() {
    if (isPlaying) stopAnimation();
    document.getElementById("yearSlider").value = MIN_YEAR;
    document.getElementById("yearLabel").innerText = MIN_YEAR;
    updateYear(MIN_YEAR);
}

// ==============================
// INITIAL LOAD: ensure filters are set
// ==============================
// After initial render, apply filters (in case initial data already has selections)
document.addEventListener('DOMContentLoaded', function() {
    applyFilters();
});
</script>
{% endblock %}
