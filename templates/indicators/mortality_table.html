{% extends 'base.html' %}

{% block title %}
Child Mortality – Table View
{% endblock %}

{% block content %}

<div class="card">
    <!-- Navigation Bar -->
    <div class="card-header d-flex justify-content-between align-items-center">
        <h4 class="mb-0">Under‑5 Mortality Rate – Table</h4>
        <div class="btn-group btn-group-sm" role="group">
            <a href="{% url 'mortality_chart' %}" class="btn btn-outline-secondary">Chart</a>
            <a href="{% url 'mortality_table' %}" class="btn btn-secondary active">Table</a>
            <a href="{% url 'mortality_map' %}" class="btn btn-outline-secondary">Map</a>
            <a href="{% url 'mortality_all' %}" class="btn btn-outline-secondary">All</a>
        </div>
    </div>

    <div class="card-body">
        <!-- YEAR SLIDERS -->
        <div class="row mb-2 align-items-center">
            <div class="col-md-6" id="year1Container">
                <label class="form-label">Year 1: <span id="year1Label">{{ current_year }}</span></label>
                <input type="range" id="year1Slider" min="1960" max="2024"
                       value="{{ current_year }}" class="form-range"
                       oninput="onYear1Input(this.value)">
            </div>
            <div class="col-md-6" id="year2Container" style="display:none;">
                <label class="form-label">Year 2: <span id="year2Label">{{ current_year }}</span></label>
                <input type="range" id="year2Slider" min="1960" max="2024"
                       value="{{ current_year }}" class="form-range"
                       oninput="onYear2Input(this.value)">
            </div>
        </div>

        <!-- CONTROLS ROW -->
        <div class="row mb-3 align-items-center g-2">
            <div class="col-auto">
                <button id="playBtn" class="btn btn-primary btn-sm" onclick="togglePlay()">▶ Play</button>
            </div>
            <div class="col-auto">
                <label for="speedSlider" class="form-label me-2">Speed</label>
                <input type="range" id="speedSlider" min="200" max="2000" value="800" step="100"
                       class="form-range" style="width:150px;" oninput="updateSpeed(this.value)">
                <span id="speedLabel">800 ms</span>
            </div>
            <div class="col-auto">
                <button class="btn btn-secondary btn-sm" onclick="resetToStart()">Reset</button>
            </div>
            <div class="col-auto">
                <label for="orderSelect" class="form-label me-1">Order</label>
                <select id="orderSelect" class="form-select form-select-sm" style="width:auto; display:inline-block;" onchange="applyFilters()">
                    <option value="desc">Highest</option>
                    <option value="asc">Lowest</option>
                </select>
            </div>
            <div class="col-auto">
                <label for="topNSelect" class="form-label me-1">Show</label>
                <select id="topNSelect" class="form-select form-select-sm" style="width:auto; display:inline-block;" onchange="applyFilters()">
                    <option value="10">10</option>
                    <option value="25" selected>25</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                    <option value="0">All</option>
                </select>
            </div>
            <!-- Year Range -->
            <div class="col-auto">
                <label class="form-label me-1">Years</label>
                <input type="number" id="rangeFrom" class="form-control form-control-sm" style="width:70px; display:inline;" value="1960" min="1960" max="2024">
                <span class="mx-1">–</span>
                <input type="number" id="rangeTo" class="form-control form-control-sm" style="width:70px; display:inline;" value="2024" min="1960" max="2024">
                <button class="btn btn-outline-primary btn-sm" onclick="applyYearRange()">Apply</button>
            </div>
            <!-- Search -->
            <div class="col-auto">
                <div class="input-group input-group-sm">
                    <input type="text" id="searchInput" class="form-control" placeholder="Search country..." style="width:140px;">
                    <button class="btn btn-outline-primary" type="button" onclick="applyFilters()">🔍</button>
                    <button class="btn btn-outline-secondary" type="button" onclick="clearSearch()">✕</button>
                </div>
            </div>
            <div class="col-auto">
                <button class="btn btn-success btn-sm" onclick="exportCSV()">📥 Export CSV</button>
            </div>
        </div>

        <!-- TABLE AREA -->
        <div style="max-height: 500px; overflow-y: auto; margin-top: 10px;">
            <div id="dataTableContainer"></div>
        </div>

        <!-- PAGINATION -->
        <div class="row align-items-center mt-3">
            <div class="col-md-6">
                <span id="pageInfo" class="text-muted">Showing 0-0 of 0</span>
            </div>
            <div class="col-md-6 d-flex justify-content-end align-items-center gap-2">
                <label for="pageSizeSelect" class="form-label me-1 mb-0">Rows per page:</label>
                <select id="pageSizeSelect" class="form-select form-select-sm" style="width:80px;" onchange="applyFilters()">
                    <option value="10">10</option>
                    <option value="25" selected>25</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                    <option value="0">All</option>
                </select>
                <button class="btn btn-outline-secondary btn-sm" onclick="goToPage('prev')" id="prevBtn">‹</button>
                <span id="pageNumberDisplay" class="mx-2">1</span>
                <button class="btn btn-outline-secondary btn-sm" onclick="goToPage('next')" id="nextBtn">›</button>
            </div>
        </div>

        <!-- FALLBACK MESSAGE -->
        <div id="noDataMessage" class="alert alert-warning text-center mt-2" style="display:none;">
            No data available for the selected year(s) and filters.
        </div>

        <!-- BOTTOM FILTERS -->
        <div class="row mt-4">
            <div class="col-md-4">
                <label class="form-label">Continent</label>
                <select id="continentFilter" class="form-select" onchange="applyFilters()">
                    <option value="">All Continents</option>
                    {% for c in continents %}
                    <option value="{{ c }}">{{ c }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Income Group</label>
                <select id="incomeFilter" class="form-select" onchange="applyFilters()">
                    <option value="">All Income Groups</option>
                    {% for i in income_groups %}
                    <option value="{{ i }}">{{ i }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Subregion</label>
                <select id="subregionFilter" class="form-select" onchange="applyFilters()">
                    <option value="">All Subregions</option>
                    {% for s in subregions %}
                    <option value="{{ s }}">{{ s }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
// ==============================
// SAFELY PARSE DATA
// ==============================
let allDataByYear = {};

try {
    allDataByYear = {{ all_data_json|safe }};
    console.log('✅ Data loaded successfully. Years:', Object.keys(allDataByYear).sort());
} catch (e) {
    console.error('❌ Failed to parse all_data_json:', e);
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('noDataMessage').style.display = 'block';
        document.getElementById('noDataMessage').innerHTML = 'Error loading data. See console.';
    });
}

// ==============================
// GLOBALS
// ==============================
let currentYear = {{ current_year }};
let year1 = {{ current_year }};
let year2 = {{ current_year }};
let compareMode = false;

let rangeStart = 1960;
let rangeEnd = 2024;

const MIN_YEAR = 1960;
const MAX_YEAR = 2024;

let isPlaying = false;
let animationInterval = null;
let animationDelay = 800;

let currentDisplayData = [];
let currentPage = 1;
let pageSize = 25;

// ==============================
// YEAR RANGE APPLICATION
// ==============================
function applyYearRange() {
    const from = parseInt(document.getElementById('rangeFrom').value);
    const to = parseInt(document.getElementById('rangeTo').value);
    if (isNaN(from) || isNaN(to) || from > to) {
        alert('Please enter a valid year range (From ≤ To).');
        return;
    }
    rangeStart = Math.max(MIN_YEAR, from);
    rangeEnd = Math.min(MAX_YEAR, to);
    // Update sliders min/max
    document.getElementById('year1Slider').min = rangeStart;
    document.getElementById('year1Slider').max = rangeEnd;
    document.getElementById('year2Slider').min = rangeStart;
    document.getElementById('year2Slider').max = rangeEnd;
    // Adjust current years if out of range
    if (year1 < rangeStart) year1 = rangeStart;
    if (year1 > rangeEnd) year1 = rangeEnd;
    if (year2 < rangeStart) year2 = rangeStart;
    if (year2 > rangeEnd) year2 = rangeEnd;
    document.getElementById('year1Slider').value = year1;
    document.getElementById('year2Slider').value = year2;
    document.getElementById('year1Label').innerText = year1;
    document.getElementById('year2Label').innerText = year2;
    applyFilters();
}

// ==============================
// PAGINATION HELPERS
// ==============================
function getPaginatedData(data) {
    const size = parseInt(document.getElementById('pageSizeSelect').value);
    if (size === 0) {
        return { data: data, totalPages: 1, currentPage: 1, start: 0, end: data.length, total: data.length };
    }
    pageSize = size;
    const total = data.length;
    const totalPages = Math.ceil(total / pageSize) || 1;
    if (currentPage > totalPages) currentPage = totalPages;
    if (currentPage < 1) currentPage = 1;
    const start = (currentPage - 1) * pageSize;
    const end = Math.min(start + pageSize, total);
    const pageData = data.slice(start, end);
    return { data: pageData, totalPages, currentPage, start, end, total };
}

function updatePaginationInfo(start, end, total, currentPage, totalPages) {
    document.getElementById('pageInfo').textContent =
        total > 0 ? `Showing ${start + 1}–${end} of ${total}` : 'No records';
    document.getElementById('pageNumberDisplay').textContent = totalPages > 0 ? currentPage : 0;
    document.getElementById('prevBtn').disabled = (currentPage <= 1 || total === 0);
    document.getElementById('nextBtn').disabled = (currentPage >= totalPages || total === 0);
}

function goToPage(direction) {
    const total = currentDisplayData.length;
    const size = parseInt(document.getElementById('pageSizeSelect').value);
    if (size === 0) return;
    const totalPages = Math.ceil(total / size) || 1;
    if (direction === 'prev' && currentPage > 1) currentPage--;
    if (direction === 'next' && currentPage < totalPages) currentPage++;
    applyFilters();
}

// ==============================
// RENDER TABLE
// ==============================
function renderTable(data) {
    const container = document.getElementById('dataTableContainer');
    const noDataMsg = document.getElementById('noDataMessage');

    if (!data || data.length === 0) {
        noDataMsg.style.display = 'block';
        container.innerHTML = '';
        document.getElementById('pageInfo').textContent = 'No records';
        document.getElementById('pageNumberDisplay').textContent = 0;
        document.getElementById('prevBtn').disabled = true;
        document.getElementById('nextBtn').disabled = true;
        return;
    }
    noDataMsg.style.display = 'none';

    const size = parseInt(document.getElementById('pageSizeSelect').value);
    let paginatedResult;
    if (size === 0) {
        paginatedResult = { data: data, totalPages: 1, currentPage: 1, start: 0, end: data.length, total: data.length };
        document.getElementById('pageNumberDisplay').textContent = 1;
        document.getElementById('prevBtn').disabled = true;
        document.getElementById('nextBtn').disabled = true;
    } else {
        const totalPages = Math.ceil(data.length / size) || 1;
        if (currentPage > totalPages) currentPage = totalPages;
        if (currentPage < 1) currentPage = 1;
        const start = (currentPage - 1) * size;
        const end = Math.min(start + size, data.length);
        const pageData = data.slice(start, end);
        paginatedResult = { data: pageData, totalPages, currentPage, start, end, total: data.length };
        document.getElementById('pageNumberDisplay').textContent = currentPage;
        document.getElementById('prevBtn').disabled = (currentPage <= 1);
        document.getElementById('nextBtn').disabled = (currentPage >= totalPages);
    }

    const pageData = paginatedResult.data;
    updatePaginationInfo(paginatedResult.start, paginatedResult.end, paginatedResult.total,
                         paginatedResult.currentPage, paginatedResult.totalPages);

    // Determine headers based on first row
    const first = pageData[0];
    let headers = [];
    let rows = [];

    if (first.hasOwnProperty('year1')) {
        // Compare mode – each row has two years
        headers = ['Country', 'Year 1', 'Year 2', 'Mortality Year 1', 'Mortality Year 2', 'Continent', 'Income Group', 'Subregion'];
        rows = pageData.map(d => [
            d.country,
            d.year1,
            d.year2,
            d.value1 !== undefined ? d.value1.toFixed(1) : '',
            d.value2 !== undefined ? d.value2.toFixed(1) : '',
            d.continent || '',
            d.income_group || '',
            d.subregion || ''
        ]);
    } else {
        // Single mode (range) – each row is a country-year pair
        headers = ['Country', 'Year', 'Mortality', 'Continent', 'Income Group', 'Subregion'];
        rows = pageData.map(d => [
            d.country,
            d.year,
            d.value !== undefined ? d.value.toFixed(1) : '',
            d.continent || '',
            d.income_group || '',
            d.subregion || ''
        ]);
    }

    let html = `<div class="table-responsive">
        <table class="table table-striped table-bordered table-hover">
            <thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
            <tbody>${rows.map(row => `<tr>${row.map(cell => `<td>${cell}</td>`).join('')}</tr>`).join('')}</tbody>
        </table>
    </div>`;
    container.innerHTML = html;
}

// ==============================
// DATA PREPARATION AND FILTERING (with year range)
// ==============================
function loadDataForYears(start, end) {
    // Collect all records for years in [start, end]
    let allRecords = [];
    for (let y = start; y <= end; y++) {
        const yearStr = String(y);
        if (allDataByYear.hasOwnProperty(yearStr)) {
            // Ensure each record has a 'year' field
            const records = allDataByYear[yearStr].map(d => ({ ...d, year: y }));
            allRecords = allRecords.concat(records);
        }
    }
    return allRecords;
}

function applyFilters() {
    try {
        const continent = document.getElementById("continentFilter").value;
        const income = document.getElementById("incomeFilter").value;
        const subregion = document.getElementById("subregionFilter").value;
        const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();

        const filterFn = (d) => {
            const continentMatch = !continent || d.continent === continent;
            const incomeMatch = !income || d.income_group === income;
            const subregionMatch = !subregion || d.subregion === subregion;
            const countryMatch = !searchTerm || d.country.toLowerCase().includes(searchTerm);
            return continentMatch && incomeMatch && subregionMatch && countryMatch;
        };

        let exportData = [];

        if (compareMode) {
            // Compare mode: still uses two specific years, but respect the year range
            let data1 = loadDataForYears(year1, year1).filter(filterFn);
            let data2 = loadDataForYears(year2, year2).filter(filterFn);
            const countries1 = new Set(data1.map(d => d.country));
            const countries2 = new Set(data2.map(d => d.country));
            const common = [...countries1].filter(c => countries2.has(c));

            const order = document.getElementById("orderSelect").value;
            const map1 = new Map(data1.map(d => [d.country, d]));
            const map2 = new Map(data2.map(d => [d.country, d]));

            let combined = common.map(country => ({
                country: country,
                value1: map1.get(country).mortality,
                value2: map2.get(country).mortality,
                year1: year1,
                year2: year2,
                continent: map1.get(country).continent || '',
                income_group: map1.get(country).income_group || '',
                subregion: map1.get(country).subregion || '',
            }));

            combined.sort((a, b) => order === 'desc' ? b.value1 - a.value1 : a.value1 - b.value1);

            const topN = parseInt(document.getElementById("topNSelect").value);
            if (topN > 0 && combined.length > topN) {
                combined = combined.slice(0, topN);
            }

            exportData = combined.map(d => ({
                country: d.country,
                year1: d.year1,
                year2: d.year2,
                value1: d.value1,
                value2: d.value2,
                continent: d.continent,
                income_group: d.income_group,
                subregion: d.subregion
            }));
        } else {
            // Single mode: load all years in the range
            let data = loadDataForYears(rangeStart, rangeEnd).filter(filterFn);
            const order = document.getElementById("orderSelect").value;
            // Sort by mortality first, then by year if needed
            data.sort((a, b) => {
                if (order === 'desc') {
                    return b.mortality - a.mortality || a.year - b.year;
                } else {
                    return a.mortality - b.mortality || a.year - b.year;
                }
            });
            const topN = parseInt(document.getElementById("topNSelect").value);
            if (topN > 0 && data.length > topN) {
                data = data.slice(0, topN);
            }

            exportData = data.map(d => ({
                country: d.country,
                year: d.year,
                value: d.mortality,
                continent: d.continent || '',
                income_group: d.income_group || '',
                subregion: d.subregion || ''
            }));
        }

        currentDisplayData = exportData;
        currentPage = 1;
        renderTable(currentDisplayData);
    } catch (e) {
        console.error('Error in applyFilters:', e);
        document.getElementById('noDataMessage').style.display = 'block';
        document.getElementById('noDataMessage').innerHTML = 'An error occurred. See console.';
    }
}

// ==============================
// CLEAR SEARCH
// ==============================
function clearSearch() {
    document.getElementById('searchInput').value = '';
    applyFilters();
}

// ==============================
// COMPARE MODE
// ==============================
function setCompareMode(mode) {
    compareMode = mode;
    document.getElementById("singleBtn").classList.toggle('active', !mode);
    document.getElementById("compareBtn").classList.toggle('active', mode);
    document.getElementById("year2Container").style.display = mode ? 'block' : 'none';
    applyFilters();
}

// ==============================
// YEAR SLIDERS
// ==============================
function onYear1Input(value) {
    if (isPlaying) stopAnimation();
    year1 = parseInt(value);
    document.getElementById("year1Label").innerText = year1;
    if (!compareMode) currentYear = year1;
    applyFilters();
}

function onYear2Input(value) {
    if (isPlaying) stopAnimation();
    year2 = parseInt(value);
    document.getElementById("year2Label").innerText = year2;
    applyFilters();
}

// ==============================
// CSV EXPORT
// ==============================
function exportCSV() {
    if (!currentDisplayData || currentDisplayData.length === 0) {
        alert('No data to export. Please adjust your filters.');
        return;
    }
    const firstRow = currentDisplayData[0];
    let headers = Object.keys(firstRow);
    let csvRows = [headers.join(',')];
    for (const row of currentDisplayData) {
        const values = headers.map(header => {
            let val = row[header] !== undefined ? row[header] : '';
            if (typeof val === 'string' && (val.includes(',') || val.includes('"') || val.includes('\n'))) {
                val = `"${val.replace(/"/g, '""')}"`;
            }
            return val;
        });
        csvRows.push(values.join(','));
    }
    const csvString = csvRows.join('\n');
    const blob = new Blob([csvString], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    const url = URL.createObjectURL(blob);
    link.href = url;
    link.setAttribute('download', `mortality_data_${compareMode ? 'compare' : 'single'}_${year1}_${year2}.csv`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
}

// ==============================
// ANIMATION
// ==============================
function togglePlay() {
    if (compareMode) {
        alert("Animation is available only in Single mode.");
        return;
    }
    if (isPlaying) {
        stopAnimation();
    } else {
        startAnimation();
    }
}

function startAnimation() {
    if (isPlaying || compareMode) return;
    if (currentYear >= rangeEnd) {
        currentYear = rangeStart;
        document.getElementById("year1Slider").value = currentYear;
        document.getElementById("year1Label").innerText = currentYear;
        year1 = currentYear;
        applyFilters();
    }
    isPlaying = true;
    document.getElementById("playBtn").innerHTML = "⏸ Pause";

    animationInterval = setInterval(() => {
        currentYear += 1;
        if (currentYear > rangeEnd) {
            currentYear = rangeStart;
        }
        document.getElementById("year1Slider").value = currentYear;
        document.getElementById("year1Label").innerText = currentYear;
        year1 = currentYear;
        applyFilters();
    }, animationDelay);
}

function stopAnimation() {
    if (animationInterval) {
        clearInterval(animationInterval);
        animationInterval = null;
    }
    isPlaying = false;
    document.getElementById("playBtn").innerHTML = "▶ Play";
}

function updateSpeed(value) {
    animationDelay = parseInt(value);
    document.getElementById("speedLabel").innerText = value + " ms";
    if (isPlaying) {
        stopAnimation();
        startAnimation();
    }
}

function resetToStart() {
    if (isPlaying) stopAnimation();
    currentYear = rangeStart;
    year1 = rangeStart;
    year2 = rangeStart + 1;
    if (year2 > rangeEnd) year2 = rangeStart;
    document.getElementById("year1Slider").value = year1;
    document.getElementById("year1Label").innerText = year1;
    document.getElementById("year2Slider").value = year2;
    document.getElementById("year2Label").innerText = year2;
    applyFilters();
}

// ==============================
// INITIALISE
// ==============================
document.addEventListener('DOMContentLoaded', function() {
    if (Object.keys(allDataByYear).length === 0) {
        document.getElementById('noDataMessage').style.display = 'block';
        document.getElementById('noDataMessage').innerHTML = 'No data available. Please check the server logs.';
        return;
    }
    // Set initial range inputs
    document.getElementById('rangeFrom').value = 1960;
    document.getElementById('rangeTo').value = 2024;
    rangeStart = 1960;
    rangeEnd = 2024;
    document.getElementById("year1Slider").min = 1960;
    document.getElementById("year1Slider").max = 2024;
    document.getElementById("year2Slider").min = 1960;
    document.getElementById("year2Slider").max = 2024;
    document.getElementById("year1Slider").value = currentYear;
    document.getElementById("year1Label").innerText = currentYear;
    document.getElementById("year2Slider").value = currentYear;
    document.getElementById("year2Label").innerText = currentYear;
    year1 = currentYear;
    year2 = currentYear;
    applyFilters();
});
</script>
{% endblock %}
