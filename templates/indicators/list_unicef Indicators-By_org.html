<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Bank Indicators by Organization</title>

<style>
body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f6f9;
    margin:30px;
}

.container{
    max-width:1200px;
    margin:auto;
}

h2{
    margin-bottom:5px;
}

#status{
    margin-bottom:15px;
    color:#555;
    line-height:1.8;
}

.filters{
    display:flex;
    gap:10px;
    margin-bottom:15px;
    flex-wrap:wrap;
}

#search{
    flex:1;
    padding:10px;
    font-size:15px;
    border:1px solid #ccc;
    border-radius:5px;
    min-width:200px;
}

#orgFilter{
    padding:10px;
    font-size:15px;
    border:1px solid #ccc;
    border-radius:5px;
    background:white;
    min-width:180px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th{
    background:#1976d2;
    color:white;
    padding:12px;
    text-align:left;
    position:sticky;
    top:0;
    z-index:10;
}

td{
    padding:10px;
    border-bottom:1px solid #ddd;
}

tr:nth-child(even){
    background:#f8f8f8;
}

tr:hover{
    background:#eef6ff;
}

.table-container{
    max-height:700px;
    overflow-y:auto;
    border:1px solid #ddd;
}

.code{
    font-family:Consolas;
    font-weight:bold;
    font-size:13px;
}

.org-badge{
    display:inline-block;
    padding:3px 10px;
    border-radius:12px;
    font-size:12px;
    font-weight:bold;
    white-space:nowrap;
}

.org-unicef{
    background:#1a8cff;
    color:white;
}

.org-UNICEF{
    background:#2e7d32;
    color:white;
}

.org-wfp{
    background:#e65100;
    color:white;
}

.org-who{
    background:#0d47a1;
    color:white;
}

.org-ilo{
    background:#4a148c;
    color:white;
}

.org-unesco{
    background:#bf360c;
    color:white;
}

.org-unhcr{
    background:#00695c;
    color:white;
}

.org-unicef-who{
    background:#00695c;
    color:white;
}

.org-other{
    background:#546e7a;
    color:white;
}

.count-badge{
    background:#e0e0e0;
    padding:2px 10px;
    border-radius:10px;
    font-size:13px;
    margin-left:5px;
}

.loading{
    text-align:center;
    padding:40px;
    color:#888;
}

.error{
    color:#d32f2f;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

<h2>World Bank Indicators <span style="font-size:16px;font-weight:normal;color:#555;">— Classified by Organization</span></h2>

<div id="status">Loading indicators...</div>

<div class="filters">
    <input
        type="text"
        id="search"
        placeholder="Search by code or indicator name...">
    
    <select id="orgFilter">
        <option value="all">All Organizations</option>
    </select>
</div>

<div class="table-container">

<table>

<thead>
<tr>
    <th style="width:180px;">Indicator Code</th>
    <th>Indicator Name</th>
    <th style="width:180px;">Organization</th>
</tr>
</thead>

<tbody id="tbody">

</tbody>

</table>

</div>

</div>

<script>

let allIndicators = [];

// Organization classification rules (based on sourceOrganization string)
function classifyOrganization(sourceOrg) {
    if (!sourceOrg) return { org: 'Unknown', css: 'org-other' };
    
    const upper = sourceOrg.toUpperCase();
    
    // Primary UN agencies
    if (upper.includes('UNICEF')) return { org: 'UNICEF', css: 'org-unicef' };
    if (upper.includes('UNICEF') || upper.includes('FOOD AND AGRICULTURE')) return { org: 'UNICEF', css: 'org-UNICEF' };
    if (upper.includes('WFP') || upper.includes('WORLD FOOD PROGRAMME')) return { org: 'WFP', css: 'org-wfp' };
    if (upper.includes('WHO') || upper.includes('WORLD HEALTH ORGANIZATION')) return { org: 'WHO', css: 'org-who' };
    if (upper.includes('ILO') || upper.includes('INTERNATIONAL LABOUR')) return { org: 'ILO', css: 'org-ilo' };
    if (upper.includes('UNESCO')) return { org: 'UNESCO', css: 'org-unesco' };
    if (upper.includes('UNHCR') || upper.includes('REFUGEE')) return { org: 'UNHCR', css: 'org-unhcr' };
    
    // Joint programs
    if (upper.includes('UNICEF') && upper.includes('WHO')) return { org: 'UNICEF/WHO', css: 'org-unicef-who' };
    
    // UN-related
    if (upper.includes('UN ') || upper.includes('UNITED NATIONS') || 
        upper.includes('UNDP') || upper.includes('UNEP') || 
        upper.includes('UNFPA') || upper.includes('UN WOMEN')) {
        return { org: 'UN Agency', css: 'org-other' };
    }
    
    // World Bank / LAC / other development organizations
    if (upper.includes('WORLD BANK') || upper.includes('SEDLAC') || 
        upper.includes('LAC EQUITY') || upper.includes('CEDLAS') ||
        upper.includes('IMF') || upper.includes('OECD')) {
        return { org: 'Other Dev Org', css: 'org-other' };
    }
    
    return { org: 'Other', css: 'org-other' };
}

async function loadIndicators(){

    const status = document.getElementById("status");
    const orgFilter = document.getElementById("orgFilter");

    try{
        status.innerHTML = '<span class="loading">⏳ Fetching data from World Bank API...</span>';

        const response = await fetch(
            "https://api.worldbank.org/v2/indicator?format=json&per_page=32000"
        );

        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }

        const json = await response.json();
        
        // The World Bank API returns an array where:
        // - First element is metadata
        // - Second element is the actual data
        if (!json || !Array.isArray(json) || json.length < 2) {
            throw new Error("Unexpected API response format");
        }

        const indicators = json[1];
        
        if (!indicators || !Array.isArray(indicators)) {
            throw new Error("No indicator data found in response");
        }

        // Process all indicators with organization classification
        allIndicators = indicators.map(ind => {
            const classification = classifyOrganization(ind.sourceOrganization);
            return {
                id: ind.id || 'N/A',
                name: ind.name || 'Unnamed',
                sourceOrganization: ind.sourceOrganization || 'Unknown',
                orgClass: classification
            };
        });

        // Build organization filter options
        const orgs = new Set();
        allIndicators.forEach(ind => {
            if (ind.orgClass && ind.orgClass.org) {
                orgs.add(ind.orgClass.org);
            }
        });

        // Sort organizations alphabetically
        const sortedOrgs = Array.from(orgs).sort();
        
        orgFilter.innerHTML = '<option value="all">All Organizations</option>';
        sortedOrgs.forEach(org => {
            const count = allIndicators.filter(ind => ind.orgClass.org === org).length;
            orgFilter.innerHTML += `<option value="${org}">${org} (${count})</option>`;
        });

        // Show status with breakdown
        let statusHTML = `Found <b>${allIndicators.length}</b> indicators from ${sortedOrgs.length} organizations`;
        
        if (sortedOrgs.length > 0) {
            statusHTML += ' &nbsp;—&nbsp; ';
            const breakdownParts = [];
            sortedOrgs.forEach(org => {
                const count = allIndicators.filter(ind => ind.orgClass.org === org).length;
                // Find one example of this org to get the CSS class
                const example = allIndicators.find(ind => ind.orgClass.org === org);
                const cssClass = example ? example.orgClass.css : 'org-other';
                breakdownParts.push(`<span class="org-badge ${cssClass}" style="margin-right:5px;">${org}: ${count}</span>`);
            });
            statusHTML += breakdownParts.join(' ');
        }
        
        status.innerHTML = statusHTML;

        renderTable(allIndicators);

    }
    catch(err){
        status.innerHTML = `<span class="error">❌ Failed to load data: ${err.message}</span>`;
        console.error("Error details:", err);
        
        // Show sample of what we received for debugging
        console.log("Check if API is accessible. Try: https://api.worldbank.org/v2/indicator?format=json&per_page=5");
    }

}

function renderTable(data){
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    if (!data || data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="3" style="text-align:center;padding:30px;color:#888;">No matching indicators found</td></tr>`;
        return;
    }

    data.forEach(ind => {
        const orgName = ind.orgClass ? ind.orgClass.org : 'Unknown';
        const cssClass = ind.orgClass ? ind.orgClass.css : 'org-other';
        
        tbody.innerHTML += `
        <tr>
            <td class="code">${ind.id}</td>
            <td>${ind.name}</td>
            <td>
                <span class="org-badge ${cssClass}">${orgName}</span>
                <div style="font-size:10px;color:#999;margin-top:3px;">${ind.sourceOrganization}</div>
            </td>
        </tr>
        `;
    });
}

function applyFilters() {
    const searchQ = document.getElementById("search").value.toLowerCase().trim();
    const orgQ = document.getElementById("orgFilter").value;

    let filtered = allIndicators.filter(ind => {
        const matchSearch = searchQ === '' || 
                           ind.id.toLowerCase().includes(searchQ) || 
                           ind.name.toLowerCase().includes(searchQ);
        const matchOrg = orgQ === 'all' || ind.orgClass.org === orgQ;
        return matchSearch && matchOrg;
    });

    renderTable(filtered);
}

// Event listeners
document.getElementById("search").addEventListener("input", applyFilters);
document.getElementById("orgFilter").addEventListener("change", applyFilters);

// Load data when page loads
loadIndicators();

</script>

</body>
</html>
