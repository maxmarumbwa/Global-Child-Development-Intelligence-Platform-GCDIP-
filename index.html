<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Global Rainfall – Static Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        #map {
            width: 100%;
            height: 100vh;
        }

        .legend {
            background: white;
            padding: 10px 14px;
            line-height: 24px;
            border-radius: 4px;
            box-shadow: 0 0 8px rgba(0, 0, 0, .2);
            font-size: 13px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .legend h4 {
            margin: 0 0 4px 0;
            font-size: 14px;
            font-weight: 600;
        }

        .legend i {
            width: 22px;
            height: 22px;
            float: left;
            margin-right: 10px;
            border-radius: 2px;
            border: 1px solid rgba(0, 0, 0, .08);
        }

        .legend .clearfix {
            clear: both;
        }

        .leaflet-popup-content {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: 500;
        }

        /* subtle loading indicator */
        #loading-tip {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(0, 0, 0, .7);
            color: #fff;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        #loading-tip.show {
            opacity: 1;
        }

        /* small title in corner */
        .map-title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(0, 0, 0, .6);
            color: #fff;
            padding: 6px 20px;
            border-radius: 24px;
            font-size: 15px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: 500;
            letter-spacing: 0.5px;
            backdrop-filter: blur(4px);
            pointer-events: none;
            white-space: nowrap;
        }

        @media (max-width: 600px) {
            .map-title {
                font-size: 12px;
                padding: 4px 14px;
                top: 12px;
            }
        }
    </style>
</head>

<body>

    <!-- Map title -->
    <div class="map-title">🌍 Global Rainfall (LTA)</div>

    <!-- Loading tip -->
    <div id="loading-tip">⏳ Loading map…</div>

    <!-- Map container -->
    <div id="map"></div>

    <!-- Leaflet -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js">
    </script>

    <script>
        // ============================================================
        // 1. MAP SETUP
        // ============================================================
        var map = L.map('map', {
            center: [20, 0],
            zoom: 2,
        });

        // Base tile layer (light background)
        L.tileLayer(
            'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 18,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
            className: 'base-tile-layer',
            opacity: 0.3, // subtle so the rainfall pops
        }
        ).addTo(map);

        // ============================================================
        // 2. STATIC RAINFALL PNG OVERLAY
        // ============================================================
        var tip = document.getElementById('loading-tip');
        tip.classList.add('show');

        // Bounds as specified
        var imageBounds = [
            [-90.0511, -180],
            [90.0511, 180]
        ];
        const imageBoundss = [[-35.0044, 10.9955], [-7.9955, 41.0044]];

        // Create the image overlay
        var rainfallLayer = L.imageOverlay(
            //'http://127.0.0.1:8000/earth_observation/api/classified/6/',
            'http://127.0.0.1:5000/api/classified_dekadal_anomaly/1990-01-21',
            imageBounds, {
            opacity: 0.85,
            interactive: false,
            // Optional: add alt text for accessibility
            alt: 'Global rainfall map'
        }
        );

        // Add to map
        rainfallLayer.addTo(map);

        // Fit map to the image bounds
        map.fitBounds(imageBounds, { padding: [12, 12] });

        // Hide loading tip once the image loads
        var imgElement = rainfallLayer.getElement();
        if (imgElement) {
            imgElement.onload = function () {
                tip.classList.remove('show');
            };
            imgElement.onerror = function () {
                tip.textContent = '⚠️ Failed to load rainfall image';
                setTimeout(function () {
                    tip.classList.remove('show');
                    tip.textContent = '⏳ Loading map…';
                }, 4000);
            };
        } else {
            // fallback: hide after a short delay
            setTimeout(function () {
                tip.classList.remove('show');
            }, 1500);
        }

        // ============================================================
        // 3. COUNTRY BORDERS (GeoJSON) – on top of rainfall
        // ============================================================
        var countryLayer = null;

        function loadCountryBorders() {
            fetch('/static/data/geojson/ne_10m_admin_0_countries_sm.geojson')
                .then(function (res) {
                    if (!res.ok) throw new Error('GeoJSON HTTP ' + res.status);
                    return res.json();
                })
                .then(function (data) {
                    countryLayer = L.geoJSON(data, {
                        style: function (feature) {
                            return {
                                color: '#2c3e50',
                                weight: 2.2,
                                opacity: 0.9,
                                fillOpacity: 0,
                                lineCap: 'round',
                                lineJoin: 'round',
                            };
                        },
                        onEachFeature: function (feature, layer) {
                            var name = feature.properties && feature.properties.ADMIN ?
                                feature.properties.ADMIN :
                                (feature.properties && feature.properties.name ?
                                    feature.properties.name :
                                    'Unknown');
                            layer.bindPopup('<strong>' + name + '</strong>');
                        }
                    });

                    countryLayer.addTo(map);
                    // Ensure borders are on top of the rainfall image
                    countryLayer.bringToFront();

                    console.log('✅ Country borders loaded');
                })
                .catch(function (err) {
                    console.error('❌ GeoJSON load error:', err);
                });
        }

        loadCountryBorders();

        // ============================================================
        // 4. LEGEND
        // ============================================================
        var legend = L.control({ position: 'bottomright' });
        legend.onAdd = function () {
            var div = L.DomUtil.create('div', 'legend');
            div.innerHTML =
                '<h4>🌧️ Rainfall (mm)</h4>' +
                '<i style="background:#deebf7"></i> 0 – 25<br>' +
                '<i style="background:#9ecae1"></i> 25 – 75<br>' +
                '<i style="background:#3182bd"></i> 75 – 150<br>' +
                '<i style="background:#08306b; border-color:#08306b;"></i> &gt; 150' +
                '<div class="clearfix"></div>' +
                '<hr style="margin:6px 0 4px; border:0; border-top:1px solid #eee;">' +
                '<span style="font-size:12px; color:#777;">Country borders shown in dark grey</span>';
            return div;
        };
        legend.addTo(map);

        // ============================================================
        // 5. EXPOSE FOR DEBUGGING
        // ============================================================
        window.__map = map;
        window.__rainfallLayer = rainfallLayer;
        window.__countryLayer = countryLayer;

        console.log('🗺️ Static rainfall map ready');
    </script>

</body>

</html>
